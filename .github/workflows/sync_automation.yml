name: Sync Google Sheets Metrics

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install gspread google-auth pandas python-dotenv

      - name: Run sync script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python scripts/sync_metrics.py

      - name: Commit and push updated metrics
        run: |
          git config user.name "copa-sync-bot"
          git config user.email "sync-bot@copasfn.org.ar"
          git add src/data/metrics.json
          git diff --quiet && git diff --staged --quiet || {
            git commit -m "chore: auto-sync metrics data"
            git pull --rebase --autostash
            git push
          }
