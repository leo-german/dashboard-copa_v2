name: Sync Google Sheets Metrics

on:
  schedule:
    - cron: '0 * * * *' # Corre automáticamente cada 1 hora
  push:
    branches: [main] # Corre automáticamente cada vez que subís un cambio
  workflow_dispatch: # 👈 ¡ESTO ACTIVA EL BOTÓN "RUN WORKFLOW" EN LA WEB!

permissions:
  contents: write  # Permiso para guardar el JSON en tu repositorio
  pages: write     # 👈 Permiso para crear la web en GitHub Pages
  id-token: write  # 👈 Permiso de seguridad requerido por GitHub Pages

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install gspread google-auth pandas python-dotenv

      - name: Run sync script
        env:
          # NOTA: Asegurate de que tu script 'sync_metrics.py' busque esta variable exacta: os.environ.get("GOOGLE_CREDENTIALS")
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python scripts/sync_metrics.py

      - name: Commit and push updated metrics
        run: |
          git config user.name "copa-sync-bot"
          git config user.email "sync-bot@copasfn.org.ar"
          git add src/data/metrics.json
          git diff --quiet && git diff --staged --quiet || {
            git commit -m "chore: auto-sync metrics data"
            git pull --rebase --autostash
            git push
          }

      # ========= A PARTIR DE AQUÍ SE GENERA TU WEB PÚBLICA =========
      
      - name: Inicializar entorno de despliegue para GitHub Pages
        uses: actions/configure-pages@v4

      - name: Empaquetar SOLAMENTE la carpeta SRC (Raíz de la web)
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'src/' # Publica solo lo que está dentro de src/ (haciendo que index.html sea la raíz)

      - name: Publicar el Dashboard en internet
        id: deployment
        uses: actions/deploy-pages@v4
